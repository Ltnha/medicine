<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống phân phối & Cập nhật trạng thái chuỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-warning">
        <div class="container">
            <a class="navbar-brand text-dark" href="#"><i class="fa-solid fa-truck-moving me-2"></i> BẢNG ĐIỀU HÀNH LOGISTICS & NHÀ THUỐC</a>
            <a href="khachhang.html" class="btn btn-outline-dark btn-sm"><i class="fa-solid fa-arrow-left me-1"></i> Trang khách</a>
        </div>
    </nav>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white text-warning font-weight-bold">
                        <i class="fa-solid fa-pen-to-square me-2"></i> CẬP NHẬT TRẠNG THÁI HÀNH TRÌNH TIẾP THEO
                    </div>
                    <div class="card-body">
                        <div class="mb-3 p-3 bg-light rounded">
                            <label class="form-label">Mã ID Hộp thuốc (Quét được từ QR):</label>
                            <input type="text" id="updateDrugId" class="form-control mb-2" placeholder="ID định danh cần cập nhật">
                            
                            <label class="form-label">Chọn trạng thái đích đến tiếp theo:</label>
                            <select id="selectStatus" class="form-select mb-3">
                                <option value="1">1 - Đang vận chuyển (Logistics)</option>
                                <option value="2">2 - Đã nhập kho phân phối (Nhà Thuốc)</option>
                                <option value="3">3 - Đã bán cho người tiêu dùng (Đốt mã QR chống tái sử dụng vỏ)</option>
                            </select>
                            
                            <button class="btn btn-warning w-100 text-dark font-weight-bold" onclick="updateStatus()">
                                <i class="fa-solid fa-file-signature me-1"></i> Ký xác nhận & Cập nhật lên Blockchain
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const contractABI = [
            { "inputs": [{ "internalType": "string", "name": "_id", "type": "string" }, { "internalType": "uint8", "name": "_statusIndex", "type": "uint8" }], "name": "updateDrug", "outputs": [], "stateMutability": "nonpayable", "type": "function" }
        ];
        let web3; let walletAddress = ""; let myContract;
        const CONTRACT_ADDRESS = "0x9237c8505195f2f82f89991776355e949Ba63d68";

        async function initWeb3() {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                myContract = new web3.eth.Contract(contractABI, CONTRACT_ADDRESS);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                walletAddress = accounts[0];
                return true;
            }
            alert("Vui lòng mở MetaMask.");
            return false;
        }

        async function updateStatus() {
            let id = document.getElementById('updateDrugId').value.trim();
            let statusValue = document.getElementById('selectStatus').value;
            if(!id) return alert("Vui lòng nhập ID thuốc!");
            const initialized = await initWeb3();
            if(!initialized) return;

            try {
                alert("Yêu cầu ví ký số xác thực hành trình...");
                let statusIndex = parseInt(statusValue);
                await myContract.methods.updateDrug(id, statusIndex).send({ from: walletAddress });
                alert(`[Blockchain] Đã cập nhật trạng thái lô thuốc sang bước [${statusIndex}] thành công.`);
                document.getElementById('updateDrugId').value = "";
            } catch (error) {
                alert("Thất bại! Hãy kiểm tra lại thứ tự cập nhật tuyến cung ứng.");
            }
        }
    </script>
</body>
</html>
